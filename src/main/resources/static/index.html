<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON-Dokument bearbeiten</title>

    <link rel="stylesheet" href="./lib/codemirror.min.css">
    <link rel="stylesheet" href="./lib/idea.min.css">
    <link rel="stylesheet" href="app.css">
</head>
<body>
    <h1>JSON-Dokument bearbeiten</h1>
    <nav class="top"><a href="table.html">→ Alle Dokumente (Tabelle)</a></nav>

    <div class="row">
        <label for="uuid"></label><input type="text" id="uuid" placeholder="UUID eingeben…" autocomplete="off">
        <button id="loadBtn">Laden</button>
        <button id="saveBtn" disabled>Speichern</button>
        <button id="deleteBtn" class="danger" disabled>Löschen</button>
        <button id="tableBtn" disabled>In Tabelle</button>
    </div>

    <label for="editor"></label><textarea id="editor"></textarea>
    <div id="status"></div>

    <script src="./lib/codemirror.min.js"></script>
    <script src="./lib/javascript.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
