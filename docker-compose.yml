services:
  postgres:
    image: postgres:18
    container_name: postgres-testdb
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: testdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql   # WICHTIG: neuer Pfad ab PG 18

volumes:
  pgdata: